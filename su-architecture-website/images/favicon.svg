<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- House outline - asymmetric left wall thicker -->
  <path d="M60 130 L60 170 L140 170 L140 130 L100 70 Z" fill="none" stroke="#1a1a1a" stroke-width="2.5" stroke-linejoin="miter"/>
  <!-- Thick left wall accent -->
  <line x1="60" y1="130" x2="60" y2="170" stroke="#1a1a1a" stroke-width="7" stroke-linecap="butt"/>
  <!-- SU text inside house -->
  <text x="112" y="158" font-family="Helvetica Neue, Arial, sans-serif" font-size="28" font-weight="300" fill="#1a1a1a" text-anchor="middle" letter-spacing="2">SU</text>
  <!-- SU ARCHITECT text below -->
  <text x="100" y="192" font-family="Helvetica Neue, Arial, sans-serif" font-size="16" font-weight="300" fill="#1a1a1a" text-anchor="middle" letter-spacing="3">SU ARCHITECT</text>
</svg>
